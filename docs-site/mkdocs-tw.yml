site_name: win-sshpass 使用手冊
site_url: https://chuccp.github.io/win-sshpass/tw/
site_description: win-sshpass 官方文件（繁體中文）
site_author: win-sshpass Team

docs_dir: docs-tw
site_dir: site-tw

theme:
  name: material
  language: zh-TW
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: 切換到深色模式
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: 切換到淺色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - 首頁: index.md
  - 快速開始:
      - 安裝: getting-started/installation.md
      - 快速開始: getting-started/quick-start.md
  - 指南:
      - SSH 連線: guide/ssh.md
      - 檔案傳輸: guide/file-transfer.md
      - 互動式 Shell: guide/shell.md
      - SCP 與 Rsync: guide/scp-rsync.md
      - 設定檔: guide/config-file.md
  - 進階:
      - Go SDK: advanced/sdk.md
      - 最佳實踐: advanced/best-practices.md
  - 更新日誌: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/chuccp/win-sshpass
  alternate:
    - name: English
      link: /win-sshpass/en/
      lang: en
    - name: 简体中文
      link: /win-sshpass/zh/
      lang: zh
    - name: 繁體中文
      link: /win-sshpass/tw/
      lang: zh-TW
    - name: 日本語
      link: /win-sshpass/ja/
      lang: ja
