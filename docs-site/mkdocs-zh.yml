site_name: win-sshpass 使用手册
site_url: https://chuccp.github.io/win-sshpass/zh/
site_description: win-sshpass 官方文档（中文）
site_author: win-sshpass Team

docs_dir: docs-zh
site_dir: site-zh

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - 首页: index.md
  - 快速开始:
      - 安装: getting-started/installation.md
      - 快速开始: getting-started/quick-start.md
  - 指南:
      - SSH 连接: guide/ssh.md
      - 文件传输: guide/file-transfer.md
      - 交互式 Shell: guide/shell.md
      - SCP 与 Rsync: guide/scp-rsync.md
      - 配置文件: guide/config-file.md
  - 高级:
      - Go SDK: advanced/sdk.md
      - 最佳实践: advanced/best-practices.md
  - 更新日志: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/chuccp/win-sshpass
  alternate:
    - name: English
      link: /win-sshpass/en/
      lang: en
    - name: 简体中文
      link: /win-sshpass/zh/
      lang: zh
    - name: 繁體中文
      link: /win-sshpass/tw/
      lang: zh-TW
    - name: 日本語
      link: /win-sshpass/ja/
      lang: ja
