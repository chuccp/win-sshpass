name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            goarch: amd64
            wix_arch: x64
          - arch: arm64
            goarch: arm64
            wix_arch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Download dependencies
        run: go mod download

      - name: Set version from tag
        run: |
          $tag = "${{ github.ref_name }}"
          $content = "package sshpass`n`nvar (`n`tVersion = `"$tag`"`n)`n"
          Set-Content -Path version.go -Value $content -Encoding UTF8 -NoNewline

      - name: Build
        run: go build -ldflags="-s -w" -o win-sshpass.exe ./cmd/sshpass
        env:
          GOARCH: ${{ matrix.goarch }}

      - name: Create zip package
        run: |
          $tag = "${{ github.ref_name }}"
          $arch = "${{ matrix.arch }}"
          Compress-Archive -Path win-sshpass.exe,README.md,README.zh-CN.md,README.zh-TW.md,README.ja.md -DestinationPath "win-sshpass-$tag-$arch.zip"

      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix
          wix eula accept wix7

      - name: Build MSI
        run: wix build -arch ${{ matrix.wix_arch }} -d Version=${{ github.ref_name }} -out win-sshpass-${{ github.ref_name }}-${{ matrix.arch }}.msi .github/workflows/win-sshpass.wxs

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-windows-${{ matrix.arch }}
          path: |
            win-sshpass-*-${{ matrix.arch }}.zip
            win-sshpass-*-${{ matrix.arch }}.msi

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            goarch: amd64
          - arch: arm64
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Download dependencies
        run: go mod download

      - name: Set version from tag
        run: |
          TAG="${{ github.ref_name }}"
          printf 'package sshpass\n\nvar (\n\tVersion = "%s"\n)\n' "$TAG" > version.go

      - name: Build
        run: go build -ldflags="-s -w" -o win-sshpass ./cmd/sshpass
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0

      - name: Create tar.gz package
        run: |
          TAG="${{ github.ref_name }}"
          ARCH="${{ matrix.arch }}"
          tar -czf "win-sshpass-$TAG-linux-$ARCH.tar.gz" win-sshpass README.md README.zh-CN.md README.zh-TW.md README.ja.md

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-linux-${{ matrix.arch }}
          path: |
            win-sshpass-*-linux-${{ matrix.arch }}.tar.gz

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            goarch: amd64
          - arch: arm64
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Download dependencies
        run: go mod download

      - name: Set version from tag
        run: |
          TAG="${{ github.ref_name }}"
          printf 'package sshpass\n\nvar (\n\tVersion = "%s"\n)\n' "$TAG" > version.go

      - name: Build
        run: go build -ldflags="-s -w" -o win-sshpass ./cmd/sshpass
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0

      - name: Create PKG + DMG package
        run: |
          TAG="${{ github.ref_name }}"
          ARCH="${{ matrix.arch }}"
          PKG_NAME="win-sshpass-$TAG-darwin-$ARCH.pkg"
          DMG_NAME="win-sshpass-$TAG-darwin-$ARCH"
          VOL_NAME="win-sshpass $TAG"

          # Build payload: /usr/local/bin/win-sshpass
          PAYLOAD="payload"
          mkdir -p "$PAYLOAD/usr/local/bin"
          cp win-sshpass "$PAYLOAD/usr/local/bin/"
          chmod 755 "$PAYLOAD/usr/local/bin/win-sshpass"

          # Build .pkg installer
          pkgbuild \
            --root "$PAYLOAD" \
            --install-location / \
            --identifier com.chuccp.win-sshpass \
            --version "$TAG" \
            "$PKG_NAME"

          # Create DMG containing the .pkg and READMEs
          DMG_DIR="dmg-staging"
          mkdir -p "$DMG_DIR"
          cp "$PKG_NAME" "$DMG_DIR/"
          for f in README.md README.zh-CN.md README.zh-TW.md README.ja.md; do
            [ -f "$f" ] && cp "$f" "$DMG_DIR/"
          done

          # Create compressed DMG
          hdiutil create \
            -volname "$VOL_NAME" \
            -srcfolder "$DMG_DIR" \
            -ov -format UDZO \
            "$DMG_NAME.dmg"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-darwin-${{ matrix.arch }}
          path: |
            win-sshpass-*-darwin-${{ matrix.arch }}.dmg

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # Publish Scoop manifest to bucket repo
  # Required secret: SCOOP_TOKEN (GitHub PAT with repo scope)
  # Prerequisite: Create a GitHub repo named "scoop-bucket"
  # ============================================================
  scoop:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate and push Scoop manifest
        env:
          SCOOP_TOKEN: ${{ secrets.SCOOP_TOKEN }}
        shell: bash
        run: |
          if [ -z "${SCOOP_TOKEN}" ]; then
            echo "SCOOP_TOKEN not set, skipping Scoop publish."
            exit 0
          fi
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/chuccp/win-sshpass/releases/download/${TAG}"

          # Compute SHA-256 hashes
          HASH_AMD64=$(sha256sum artifacts/win-sshpass-${TAG}-amd64.zip | awk '{print $1}')
          HASH_ARM64=$(sha256sum artifacts/win-sshpass-${TAG}-arm64.zip | awk '{print $1}')

          # Generate Scoop manifest JSON
          cat > win-sshpass.json <<EOF
          {
              "version": "${VERSION}",
              "description": "Windows SSHpass - SSH with password authentication from the command line.",
              "homepage": "https://github.com/chuccp/win-sshpass",
              "license": "Apache-2.0",
              "architecture": {
                  "64bit": {
                      "url": "${BASE_URL}/win-sshpass-${TAG}-amd64.zip",
                      "hash": "${HASH_AMD64}"
                  },
                  "arm64": {
                      "url": "${BASE_URL}/win-sshpass-${TAG}-arm64.zip",
                      "hash": "${HASH_ARM64}"
                  }
              },
              "extract_dir": ".",
              "bin": "win-sshpass.exe",
              "checkver": {
                  "github": "https://github.com/chuccp/win-sshpass"
              },
              "autoupdate": {
                  "architecture": {
                      "64bit": {
                          "url": "https://github.com/chuccp/win-sshpass/releases/download/v\$version/win-sshpass-v\$version-amd64.zip"
                      },
                      "arm64": {
                          "url": "https://github.com/chuccp/win-sshpass/releases/download/v\$version/win-sshpass-v\$version-arm64.zip"
                      }
                  }
              }
          }
          EOF

          # Clone scoop-bucket repo and push manifest
          git clone https://x-access-token:${SCOOP_TOKEN}@github.com/chuccp/scoop-bucket.git
          cd scoop-bucket
          mkdir -p bucket
          cp ../win-sshpass.json bucket/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/win-sshpass.json
          git diff --cached --quiet || git commit -m "Update win-sshpass to ${VERSION}"
          git push

