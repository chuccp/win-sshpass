name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            goarch: amd64
            wix_arch: x64
          - arch: arm64
            goarch: arm64
            wix_arch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Download dependencies
        run: go mod download

      - name: Set version from tag
        run: |
          $tag = "${{ github.ref_name }}"
          $content = "package main`n`nvar (`n`tversion = `"$tag`"`n)`n"
          Set-Content -Path version.go -Value $content -Encoding UTF8 -NoNewline

      - name: Build
        run: go build -ldflags="-s -w" -o win-sshpass.exe .
        env:
          GOARCH: ${{ matrix.goarch }}

      - name: Create zip package
        run: |
          $tag = "${{ github.ref_name }}"
          $arch = "${{ matrix.arch }}"
          Compress-Archive -Path win-sshpass.exe,README.md,README.zh-CN.md,README.zh-TW.md,README.ja.md -DestinationPath "win-sshpass-$tag-$arch.zip"

      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix
          wix eula accept wix7

      - name: Build MSI
        run: wix build -arch ${{ matrix.wix_arch }} -d Version=${{ github.ref_name }} -out win-sshpass-${{ github.ref_name }}-${{ matrix.arch }}.msi .github/workflows/win-sshpass.wxs

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.arch }}
          path: |
            win-sshpass-*-${{ matrix.arch }}.zip
            win-sshpass-*-${{ matrix.arch }}.msi

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}