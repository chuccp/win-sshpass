site_name: win-sshpass ユーザーガイド
site_url: https://chuccp.github.io/win-sshpass/ja/
site_description: win-sshpass 公式ドキュメント（日本語）
site_author: win-sshpass Team

docs_dir: docs-ja
site_dir: site-ja

theme:
  name: material
  language: ja
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: ダークモードに切り替え
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: ライトモードに切り替え
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - ホーム: index.md
  - はじめに:
      - インストール: getting-started/installation.md
      - クイックスタート: getting-started/quick-start.md
  - ガイド:
      - SSH 接続: guide/ssh.md
      - ファイル転送: guide/file-transfer.md
      - インタラクティブシェル: guide/shell.md
      - SCP と Rsync: guide/scp-rsync.md
      - 設定ファイル: guide/config-file.md
  - 上級編:
      - Go SDK: advanced/sdk.md
      - ベストプラクティス: advanced/best-practices.md
  - 変更履歴: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/chuccp/win-sshpass
  alternate:
    - name: English
      link: /win-sshpass/en/
      lang: en
    - name: 简体中文
      link: /win-sshpass/zh/
      lang: zh
    - name: 繁體中文
      link: /win-sshpass/tw/
      lang: zh-TW
    - name: 日本語
      link: /win-sshpass/ja/
      lang: ja
